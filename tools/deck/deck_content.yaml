slides:
  - layout: title
    title: "ESG Momentum Engine"
    subtitle: "PolyFinTech100 API Hackathon 2026 / CGS International track"
    body:
      - "Predicting ESG trajectory improvement before ratings catch up."
      - "Team: The Backtesters / 2026-06-13"
      - "Live demo: backtesters.vercel.app"

  - layout: statement
    title: "ESG ratings lag. The change leads."
    body:
      - "Problem: static ESG scores are lagging indicators - they miss early movers."
      - "Thesis: the CHANGE in ESG signal predicts returns before ratings update."
      - "Universe: 500 screened -> 198 liquid ASEAN names."
      - "Markets: SG 47 / MY 46 / ID 43 / TH 37 / VN 25."

  - layout: split
    title: "Data pipeline and signal construction"
    figure_path: "../../outputs/figures/ic_bar.png"
    body:
      - "KEPT: yfinance (prices, FX, fundamentals) + GDELT 2.0 (news sentiment)."
      - "DROPPED: Yahoo ESG endpoint (HTTP 404); SGX/Bursa disclosures (empty feed)."
      - "Signal families: A sentiment, C fundamentals, F regulatory."
      - "ICs Newey-West corrected; Benjamini-Hochberg FDR at q=0.10."
      - "Chart illustrative until Phase 4 is frozen."

  - layout: split
    title: "Validation methodology"
    figure_path: "../../outputs/figures/placebo_histogram.png"
    body:
      - "Fama-MacBeth regressions with momentum, size, sector and country controls."
      - "Four composites compared: EIP, TRI, CPS, MASTER."
      - "Block-bootstrap 95% CIs; train <=2021-12 / test 2022+ enforced once."
      - "1,000-permutation placebo test - real model in the top 2%."
      - "Illustrative until Phase 4 is frozen."

  - layout: statement
    title: "Product: live, interactive, honest"
    body:
      - "Live site: backtesters.vercel.app"
      - "Dark monochrome interface, fully interactive."
      - "198-name screener plus a Model Performance dashboard."
      - "Synthetic-data badges auto-hide when real Phase 4 data lands."

  - layout: statement
    title: "Risks and data honesty"
    body:
      - "No fabricated data - missing values stay missing."
      - "B-family dropped (Yahoo 404); D-family dropped (empty disclosure feed)."
      - "Look-ahead: enforced train/test split. Survivorship: fixed universe."
      - "Multiple testing: Benjamini-Hochberg FDR at q=0.10."
      - "Research demonstration - not investment advice."

  - layout: closing
    title: "ESG momentum predicts returns before ratings catch up."
    body:
      - "3 signal families, 4 composites, a 198-name ASEAN universe."
      - "Next: licensed ESG data -> full disclosure feed -> live pipeline."
      - "backtesters.vercel.app"
