[pytest]
# Project-local tmp root: the default %TEMP%\pytest-of-<user> directory was created by a
# sandboxed session with foreign ACLs and is permanently access-denied (see CODEX_RESULTS.md,
# mirror pass 2026-06-13). --basetemp is wiped by pytest each run; keep it dedicated.
addopts = --basetemp=.pytest-tmp
