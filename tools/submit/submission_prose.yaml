methodology: '## Methodology — Actions Taken


  This section is the complete, unredacted record of how the ESG Momentum Engine was built, in the order
  it was built, with the reasoning behind every material decision, the alternatives that were considered,
  and why each was accepted or rejected. It is written so that an auditor can reconstruct the entire process
  and challenge any single choice. Every research parameter named below was fixed in the central configuration
  before the validation window was ever evaluated, so that no threshold could be reverse-engineered from
  the answer. Realized result magnitudes — information coefficients, spreads, the Deflated Sharpe — are
  reported in the Results section and are read directly from the frozen Phase 4 results object; this section
  documents method and decisions only.


  ## Universe construction


  The universe target was set at 500 ASEAN equities with a hard acceptance gate of at least 450 valid
  tickers. Five hundred is large enough to support cross-sectional statistics — quintile portfolios need
  roughly twenty-five or more names per bucket to be stable, and the multiple-testing and regression machinery
  needs a wide cross-section each month — while remaining small enough to fetch from free data sources
  within their rate limits. The 450 gate makes any shrinkage visible rather than silent. The realized
  universe is 477 names. Six markets were intended (Singapore, Indonesia, Malaysia, Thailand, the Philippines,
  Vietnam); the Philippines was dropped because the data provider''s regional screener returns zero Philippine
  Stock Exchange equities and no PSE ticker resolves under any Yahoo suffix tested. Rather than fabricate
  Philippine coverage from a second, unvalidated source mid-build, the gap was documented and the curated
  Philippine seed list reserved for the licensed-import upgrade path. That decision is recorded in the
  bias register.


  Names per market are allocated proportional to each market''s captured aggregate USD market capitalization,
  subject to a 25 percent per-market share cap with pro-rata redistribution of the excess. The realized
  allocation is Singapore 125, Indonesia 116, Thailand 100, Malaysia 96, and Vietnam 40, summing to 477.
  The cap exists because of a measurable data artifact: the screener truncates each market at 250 results,
  so the larger markets — Indonesia and Malaysia — have their captured aggregate market cap understated,
  while Singapore''s exchange is polluted with foreign secondary listings that overstate it. A naive proportional
  allocation under those conditions drove Singapore to between 45 and 51 percent of the entire universe,
  turning the cross-section into a Singapore proxy. Two alternatives were considered and rejected: equal
  per-market quotas, which would misrepresent the genuine economic weight of each market, and free-float-adjusted
  allocation, for which the underlying float data is too sparse across ASEAN to be reliable. The 25 percent
  cap is a standard single-market-dominance guardrail and lands the final mix close to true regional market-cap
  shares; the raw uncapped shares are logged for audit.


  Singapore required an additional cleaning step. The SGX screener is contaminated with depository receipts
  of foreign and cross-listed firms — PetroChina, Bank of China, HSBC, Tencent, Alibaba, and others —
  which double-count constituents and carry inflated or misreported market caps, one showing US$480 billion.
  The filter drops names containing "SDR" or four-letter tickers ending in "D", applies a US$150 billion
  market-cap sanity ceiling, and de-duplicates by company name, which removed the SingTel dual line. Market-cap
  tiers are fixed at mega for at least US$10 billion, large for at least US$2 billion, and mid below that.


  Liquidity is measured as median daily dollar volume over a trailing six-month window, and two thresholds
  serve two distinct purposes. A floor of US$250,000 governs backtest eligibility in the full universe:
  74 names fall below it and are flagged low-liquidity, kept in the scoreboard and leaderboard because
  a user may still want to see them, but excluded from backtest portfolios because the transaction-cost
  and capacity assumptions do not hold for thinly traded names. The tighter floor of US$1,000,000, restricted
  to mega- and large-cap tiers, defines the discovery universe described next.


  The single largest mid-build decision was the pivot from the full 477-name universe to a 198-name liquid
  discovery universe, forced by GDELT throttling. The exact moment is documented: the full-universe sentiment
  fetch wedged at roughly 48 of 477 names — about 10 percent — when GDELT''s IP-level rate limiting put
  each throttled ticker into a multi-minute exponential backoff, at which rate the full universe was days
  from completion rather than hours. Two options were rejected. Continuing to grind the full 477 was unusable
  on any hackathon timeline. Freezing on the partial data already collected would have been scientifically
  worse than worthless, because three of the four composites would have appeared to lose purely because
  their sentiment inputs were missing, not because their signal was absent — a missing-data artifact masquerading
  as a result. The decision was to run all statistical discovery on the liquid discovery universe of 198
  names — those in the mega and large tiers with at least US$1,000,000 median daily dollar volume — which
  carry complete sentiment coverage, while still scoring the full 477 for the leaderboard. The discovery
  universe breaks down as Singapore 47, Malaysia 46, Indonesia 43, Thailand 37, and Vietnam 25, and is
  persisted as a documented artifact with its exact selection criteria so the validation scope is reproducible.
  This strengthens rather than weakens rigor. It is the standard separation that real quant desks make
  between validation — a tight universe with the best available data, where statistical claims are made
  — and deployment — a broader universe where the validated model is applied with documented per-name
  caveats. It is in fact cleaner than the original design, because every variable''s information coefficient
  is now computed on the same consistent, fully covered cross-section, so the composite comparison is
  apples-to-apples rather than confounded by differential coverage. The leaderboard for the remaining
  names carries confidence bands that widen with missing coverage, so deployment never overstates what
  validation established.


  ## Data fetchers and how their failures shaped the signal set


  Three sources were chosen for explicit reasons. Daily prices, FX, and fundamentals come from yfinance
  because it is free, broad, and covers ASEAN, which is appropriate for a research demonstration; its
  limitation is that it is an unofficial scrape, which is precisely why the CSV and API import layer exists
  as the compliant production route. Prices run from 2014 to the retrieval date for all 477 names, converted
  to USD as local close times same-day FX, with weekends forward-filled — the single documented exception
  to the no-imputation rule, justified because a currency rate is genuinely constant across a non-trading
  weekend. News sentiment comes from GDELT DOC 2.0 because it is the only free, global, daily-updated
  news instrument with the historical depth the momentum thesis requires; monthly average tone and article
  volume are pulled from its TimelineTone and TimelineVolRaw endpoints. GDELT''s known weakness is entity-matching
  noise from company-name collisions, mitigated by stripping legal-form suffixes from query strings, and
  its hard rate limit of one request per five seconds is the operational constraint that forced the universe
  pivot. Sustainability disclosures were scoped, deliberately, as best-effort for SGX and Bursa only.


  Two failures materially shaped the model, and both are documented rather than hidden. First, the ESG
  snapshot could not be retrieved at all: Yahoo''s free Sustainalytics endpoint now returns HTTP 404 for
  every symbol queried, including US mega-caps such as Apple, which confirms it is an upstream removal
  of the free feed and not an ASEAN-coverage thinness or a fetcher defect. The fetcher degraded exactly
  as designed, writing a schema-correct but empty snapshot and a complete failure log, fabricating nothing.
  The consequence is that the entire B-family — ESG level, ESG momentum, controversy, pillar imbalance
  — and the E1 governance variable are unavailable in live mode. This is logged in the bias register and
  is, in fact, a live demonstration of the project''s own thesis: dependence on a single ESG provider
  is a fragility, not merely a divergence problem, which is the argument made by the aggregate-confusion
  literature on rating disagreement. Second, the SGX and Bursa disclosure feed returned zero rows in the
  live run, so the D-family — disclosure-frequency trend and disclosure recency — is empty. The net effect
  is that the live model rests on the families that are genuinely populated: the A-family of sentiment
  dynamics, the C-family of capital-allocation fundamentals, and the F1 regulatory overlay, plus the control
  variables. Where the two-by-two classification needs an ESG-level axis, it falls back to the trailing
  twelve-month mean news-tone percentile and tags that substitution in metadata so it is never mistaken
  for a real Sustainalytics level. A reader who finds an undocumented empty family would rightly distrust
  everything else; nothing here is undocumented.


  ## Signal families: exact definitions


  Every variable is a pure, point-in-time function of the raw panels. A signal observed at month t uses
  only data dated on or before t, and fundamentals carry a 90-day publication lag so that a fiscal-year-end
  figure is not treated as known until 90 days after the period closes. The snapshot-based ESG variables
  are the one documented exception to point-in-time construction, because a single retrieval-stamped snapshot
  is not a history, and they are flagged accordingly. At each monthly rebalance date every variable is
  winsorized at the 1st and 99th percentiles to cap the influence of outliers and data errors, then z-scored
  cross-sectionally within that date so that it has mean zero and unit standard deviation across the names
  present that month, then sign-oriented so that a higher z-score always corresponds to a better expected
  return under the hypothesis. This within-date winsorize-and-standardize construction is standard factor
  practice. Missing values are left missing and never imputed: a name absent from a variable simply does
  not enter that variable''s cross-section, and its overall coverage is reported.


  The A-family captures sentiment dynamics from GDELT. A1, sentiment velocity, is the ordinary-least-squares
  slope of monthly average tone over the trailing twelve months, requiring at least nine of twelve observations;
  it is the core thesis variable, capturing gradual tone improvement that official scores have not yet
  reflected, and is oriented positively. A2, sentiment acceleration, is the trailing six-month tone slope
  minus the prior six-month tone slope — whether the improvement itself is speeding up — oriented positively.
  A3, attention trend, is the OLS slope of the natural log of one plus article volume over twelve months,
  capturing rising coverage of improving names, oriented positively. A4, tone dispersion, is the standard
  deviation of monthly tone over twelve months, a controversy and uncertainty proxy oriented negatively.


  The C-family captures capital allocation and the balance sheet. C1, CapEx-intensity trend, is the change
  in CapEx divided by revenue over three years, a transition-investment proxy, oriented positively. C2,
  cost-of-debt trend, is the change in interest expense divided by total debt over two years — the credit
  market''s repricing of the name — oriented negatively because a rising cost of debt is unfavorable.
  C3, revenue growth, is the three-year revenue compound annual growth rate, oriented positively. C4,
  the CapEx-to-depreciation trend, is the change in CapEx divided by depreciation over two years, an asset-renewal
  proxy, oriented positively.


  F1, the macro overlay, is a slowly varying country regulatory-momentum index on a zero-to-ten scale,
  built by hand from four publicly cited and dated components: carbon pricing scored zero to three, mandatory
  climate disclosure zero to three, sustainable-finance taxonomy zero to two, and a stewardship and governance
  code zero to two. F1 is tested both as a direct signal and as an interaction term, to ask whether a
  company-level signal pays more in a strengthening regulatory regime. The control variables — twelve-minus-one
  price momentum, log market cap as a size proxy, twelve-month volatility, and sector and country dummies
  — are never sold as ESG alpha; they exist so that any ESG result must prove it carries information beyond
  the well-known factors.


  ## Phase 4: discovery and validation


  The validation protocol runs in a fixed order, and the train/test separation is enforced in code rather
  than by convention. Univariate screening computes, for each variable and each forward horizon of one,
  three, six, and twelve months, the monthly Spearman rank information coefficient between the within-date
  z-score and the forward USD return. Spearman rank correlation is used rather than Pearson because the
  relationship need only be monotonic, not linear, and rank correlation is robust to the heavy tails of
  returns. Each IC time series is summarized by its mean, its standard deviation, a Newey-West-corrected
  t-statistic, and its hit rate. The Newey-West HAC correction is applied with a lag equal to the return
  horizon because overlapping multi-month forward returns induce mechanical autocorrelation in the IC
  series that would otherwise inflate the t-statistic; setting the lag equal to the horizon is the standard,
  conservative choice for overlapping windows.


  Multiple-testing control is applied next, and it is the section that wins the methodology argument.
  Roughly eighteen variables across four horizons amount to about seventy-two hypotheses, and reporting
  only the ones that worked would be textbook data-mining. Benjamini-Hochberg false-discovery-rate control
  at q equal to 0.10 is therefore applied jointly across all variable-by-horizon hypotheses, and only
  survivors are eligible to enter composites. The choice of q equal to 0.10 is deliberate: in a noisy
  financial cross-section, controlling the expected proportion of false discoveries at ten percent is
  the right balance between discipline and power. A Bonferroni-style family-wise bound would be so conservative
  that it rejects genuine signal, while no correction at all would license noise. This directly engages
  the factor-zoo critique of Harvey, Liu, and Zhu (2016), who show that most candidate factors in the
  literature do not survive honest multiple-testing correction. Control variables are excluded from the
  hypothesis family because they are nuisance regressors, not discoveries.


  Multivariate structure is then examined with Fama-MacBeth cross-sectional regressions. For the surviving
  variables, the forward three-month return is regressed cross-sectionally each month on the survivors
  plus all controls — momentum, size, volatility, and sector and country dummies — and Newey-West t-statistics
  are taken on the time series of coefficients. This answers the only question that matters for an ESG-alpha
  claim: does any ESG variable carry information beyond momentum, size, sector, and country. The three-month
  horizon matches the quarterly rebalance of the backtest. Variance inflation factors are computed across
  the survivors and any variable exceeding a VIF of five is flagged for orthogonalization, so that collinear
  signals are not double-counted, and the F1 regulatory interaction is tested explicitly rather than assumed.


  The train/test protocol is strict. The training window is everything up to and including 31 December
  2021; the test window is 1 January 2022 to the present. Every selection decision — which variables survive,
  which composite and which weighting scheme wins — is made on the training window only, and the test
  window is evaluated exactly once, at the end, with the already-frozen winning composite. This is enforced
  in code: the function that selects the winner receives only training-window data. The 2021/2022 boundary
  was chosen because it places a genuine regime change, the 2022 rate shock, squarely in the out-of-sample
  period; a signal that survives that is far more believable than one tuned through it.


  ## Composite construction


  Four composites are built from FDR-surviving members only. EIP, the ESG Improvement Probability, combines
  sentiment velocity, attention trend, ESG momentum where available, and the disclosure trend. TRI, the
  Transition Readiness Index, combines the CapEx-intensity trend, the cost-of-debt trend, and the country
  regulatory overlay. CPS, the Credibility Premium Signal, combines governance, controversy, and tone
  dispersion. MASTER is a training-IC-weighted blend of the three family composites. Each composite is
  built under three weighting schemes — equal weight, trailing-IC weight, and rank-aggregate — for twelve
  candidate configurations in total. Equal weighting is the robust default with no parameters to overfit;
  trailing-IC weighting lets the data speak but risks chasing noise; rank-aggregate is robust to outliers
  in any single member. Rather than pick one a priori, all three are built and the winner is selected
  purely on training-window net quarterly Q5-minus-Q1 spread, and the count of twelve configurations is
  carried forward into the Deflated Sharpe so the winner is explicitly penalized for the breadth of the
  search. Membership is determined by the live FDR survivor set; on the synthetic validation panel, where
  a latent factor was planted to drive both rising tone and forward returns, the planted variables surfaced
  as survivors and the sentiment-led composite recovered the factor, which is the evidence that the selection
  machinery behaves correctly before it ever touches live data. The four product pillars exposed in the
  leaderboard reuse the same machinery: members within each pillar are training-IC-weighted, and the shipped
  pillar weights are the normalized training-window pillar information coefficients floored at 0.05 so
  every pillar retains a visible minimum weight. This end-to-end research-driven weighting is what lets
  the front-end weight sandbox recompute the overall score as the weighted sum of pillar scores and reproduce
  the validated ranking exactly, with data coverage shown separately and held out of the weighted sum.


  ## Backtest design


  The backtest forms quarterly-rebalanced quintile portfolios on the winning composite, equal-weighted
  within each quintile, over the liquidity-filtered universe, in USD. Transaction costs use a documented
  ASEAN cost matrix of one-way basis points by market and cap tier: Singapore 25 for mega and large and
  35 for mid; Malaysia and Thailand 30, 35, and 45; Indonesia 35, 40, and 50; the Philippines and Vietnam
  45, 50, and 60. The matrix is graded by market development and cap tier — more developed, more liquid
  markets and larger names are cheaper to trade — and is calibrated from published exchange commission
  schedules, typical quoted bid-ask spreads, and a volume-scaled market-impact allowance, with the basis
  recorded in the cost-assumptions appendix. Both gross and net returns are reported; the headline is
  the net figure. Reported metrics include annualized return and volatility, Sharpe and Sortino, maximum
  drawdown, Calmar, and the Q5-minus-Q1 spread. The net spread is reported not as a point estimate but
  with a block-bootstrap 95 percent confidence interval, resampling the period returns in six-month blocks
  over 2,000 iterations. Six-month blocks are used rather than independent resampling precisely to preserve
  the serial dependence and overlapping structure of the return series, which an i.i.d. bootstrap would
  destroy and thereby understate the interval. The Deflated Sharpe Ratio is computed and reported, with
  the trial count set to the twelve composite-by-scheme configurations actually tried, so that the Sharpe
  is discounted for the selection effort that produced it; this single, honestly computed number is the
  strongest available defense against inflated backtest claims. Two benchmarks are reported: the equal-weighted
  universe, and naive ESG-level quintiles — the latter being the direct test of the thesis that momentum
  beats level. A placebo test shuffles the composite cross-sectionally within each formation date and
  recomputes the spread over 1,000 iterations, compared gross against gross because transaction costs
  are orthogonal to whether a ranking carries information and netting both sides would only invite a cost-model
  artifact into the p-value. Robustness is reported across sub-periods, by country, by sector, and under
  a one-month formation lag. Before any live data, the entire pipeline was validated on the seeded synthetic
  panel and recovered the planted latent factor at a rank correlation near 0.71 with a placebo p-value
  of zero, confirming that the live numbers, once frozen, are produced by correct code rather than by
  accident. Every threshold named here is defined in the central configuration, every coverage claim is
  reproducible from the raw data and the action log, and every cut and failure is recorded in the research
  log and bias register; nothing material to the result was decided off the record.'
scoring methodology: The overall score is the validated weighted sum of four 0-to-100 pillar percentiles
  (Sentiment Dynamics, Transition Readiness, Governance Credibility, Disclosure Behavior); the fifth pillar,
  Data Coverage, is displayed for honesty but deliberately excluded from the weighted sum. Pillar percentiles
  are computed cross-sectionally at the as-of date from the same training-IC-weighted member z-scores
  used in validation, so the front-end weight sandbox recomputing overall = sum of weight times pillar
  exactly reproduces the served ranking. Grades follow fixed bands (A+ at 90, A at 80, B at 65, C at 50,
  else D). The 2x2 classification (Hidden Winner, Future Leader, Overrated Leader, Value Trap) splits
  ESG-level against ESG-momentum at cross-sectional medians; with the live ESG level unavailable the level
  axis falls back to trailing-12-month mean-tone percentile, tagged in metadata. A name with no observed
  pillar is excluded and counted; an unobserved single pillar is filled at the neutral median (50) for
  both display and the weighted sum, with the gap surfaced through the coverage pillar, the low-coverage
  flag, and a widened confidence band.
confidence methodology: 'Each score carries a confidence band whose half-width grows with missing data
  and within-name signal disagreement: half-width equals a base term plus a coverage coefficient times
  the fraction of candidate variables not observed, plus a dispersion coefficient times the standard deviation
  of the name''s pillar scores, clipped to the 0-to-100 range. The intent is that a name scored on thin
  or internally contradictory evidence shows a visibly wider band than one scored on full, agreeing evidence,
  so a user reads uncertainty directly off the card rather than mistaking a sparse score for a confident
  one. The coefficients are fixed in config and documented; they are a transparent reliability heuristic,
  not a statistical posterior, and are labeled as such.'
limitations and risk prose: This build validates the research methodology, the data contracts, and the
  end-to-end pipeline; it is a research demonstration, not investment advice, and is labeled as such throughout.
  The largest limitations are honest data gaps, not hidden ones. The free Sustainalytics ESG feed is gone,
  so the official-score families are unavailable and the model leans on alternative data; the SGX/Bursa
  disclosure feed returned nothing; sentiment validation runs on the 198-name liquid universe rather than
  all 477. Point-in-time ESG history does not exist for these names, so reconstructed ESG-momentum is
  proxied. Survivorship is present by construction because today's constituents are yesterday's survivors.
  Shorting is infeasible in several ASEAN markets, so the Q5-minus-Q1 spread is partly theoretical and
  the implementable result is long-only Q5 versus benchmark. The licensed CSV/API import path is the route
  that closes the data gaps for production use.
risk register narrative: 'Risks are graded by severity and paired with mitigations. Methodological: look-ahead
  bias (mitigated by strict point-in-time construction and a once-touched test window), survivorship (disclosed,
  spread partially insulated), multiple testing and overfitting (mitigated by Benjamini-Hochberg FDR and
  the Deflated Sharpe), short sample and regime dependence (mitigated by sub-period reporting). Data:
  single-provider ESG dependence that already materialized as total loss (bias-register B-16), GDELT entity-matching
  noise, yfinance terms-of-service fragility, Scope 3 emissions gaps in ASEAN disclosure, and greenwashing
  of disclosure-volume signals (partially cross-checked by sentiment and fundamentals). Market and implementation:
  ASEAN liquidity, FX exposure across five currencies, transaction costs and turnover, and shorting infeasibility.
  Each is rated for severity, likelihood, mitigation, and residual risk in the accompanying table.'
data-source and licensing risks: yfinance is an unofficial scrape of Yahoo Finance and is appropriate
  for a research demonstration but not for production redistribution; the disappearance of the free Sustainalytics
  endpoint mid-build is concrete evidence of that fragility. GDELT, exchange announcements, and any issuer
  disclosures must each be reviewed for permitted use, redistribution, caching, attribution, and client-facing
  display rights before any launch. The compliant production path is the CSV/API import layer, which lets
  a licensed data provider (including the sponsor's own feeds) drop in behind the same frozen schemas
  without re-engineering the model.
statistical risks: 'The dominant statistical risks are look-ahead bias, survivorship bias, multiple testing,
  factor crowding, small per-market samples, unstable correlations, non-stationary relationships, transaction-cost
  underestimation, and overstated inference from noisy proxies such as news tone. The design confronts
  these explicitly: point-in-time signals, a once-touched out-of-sample window spanning the 2022 regime
  change, Benjamini-Hochberg FDR control at q equals 0.10, Newey-West HAC standard errors on overlapping
  horizons, a block bootstrap that respects serial dependence, and a Deflated Sharpe that penalizes the
  number of configurations tried. Residual risk remains from the short ASEAN sample and the alternative-data
  proxy structure, and is stated rather than smoothed over.'
model-governance risks: The model depends on versioned data contracts (SCHEMAS.md), a parameter set frozen
  before validation (config/settings.yaml), a once-touched test window, reviewable transformations, and
  explicit sign-off before any live client use. Weight-sandbox outputs are labeled as custom exploratory
  views, not validated model outputs, and a one-click reset restores the validated weights. Any change
  to a research parameter must be logged with its rationale before re-running validation, so the frozen-before-the-answer
  discipline is preserved.
cybersecurity and privacy risks: The frontend is a static client that reads JSON only; it has no backend
  and no user data. Runtime schema validation rejects malformed or out-of-range JSON before render, so
  a corrupted feed shows an explicit error rather than silently mis-rendering. Any future upload, API,
  or CSV-import path must validate file type, size, schema, encoding, numeric bounds, formula-injection
  strings, and personally identifiable information before accepting user-provided data; the CSV validator
  already enforces exact columns, ranges, date monotonicity, duplicate-key detection, and formula-injection
  rejection as the template for that gate.
user-misinterpretation risks: Users may overread ranks, grade badges, confidence bands, or backtest-style
  charts as advice. The product keeps a persistent research-demonstration disclaimer and, in synthetic
  mode, a synthetic-data banner; it shows coverage and confidence next to every score, explains missing
  data rather than hiding it, and avoids action-oriented language such as buy, sell, or outperform. The
  explanation engine is rule-based and deterministic, naming the actual contributing variables, so a reader
  can trace any score to its drivers rather than trusting an opaque number.
default: This narrative is supplied from the Claude-authored submission prose; if this default text appears
  in the rendered report it indicates an un-keyed marker that should be mapped to a specific section before
  final submission.
